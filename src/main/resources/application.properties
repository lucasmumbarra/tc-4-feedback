quarkus.azure-functions.app-name=feedback-1776303760398
quarkus.azure-functions.runtime.java-version=21
quarkus.http.root-path=/api

# Datasource (MySQL) - valores sensíveis via env vars no Azure
quarkus.datasource.db-kind=mysql
quarkus.flyway.migrate-at-start=true
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.jdbc.timezone=UTC

# Logs (úteis para visualizar no Application Insights / Log stream)
quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern=%h %l %u %t "%r" %s %b %D
quarkus.log.level=INFO
