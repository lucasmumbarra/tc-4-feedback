# Deploy do Resource Group + infra/main.bicep (manual).
# Pré-requisitos no Azure: federated credential (OIDC) + secrets no repositório.
# Ver: https://learn.microsoft.com/azure/azure-resource-manager/bicep/deploy-github-actions
# Action: https://github.com/marketplace/actions/deploy-azure-resource-manager-arm-template

name: Infra — deploy

on:
  workflow_dispatch:
    inputs:
      prefix:
        description: Prefixo dos recursos (ex. tc4fb)
        required: true
        default: tc4fb
      environment:
        description: Ambiente (RG da infra = rg-{prefix}-{environment}-infra)
        required: true
        default: demo
      location:
        description: Região do Resource Group e recursos (ex. eastus)
        required: true
        default: eastus
      feedback_table_name:
        description: Nome da tabela no Azure Table Storage
        required: true
        default: feedbacks
      azure_http_timeout_seconds:
        description: Timeout (segundos) do SDK Azure no runtime
        required: true
        default: "10"
      function_app_base_name:
        description: Nome base da Function App (ex. tc4fb-func)
        required: true
        default: tc4fb-func
      function_app_use_unique_suffix:
        description: Adicionar sufixo único no nome da Function App
        required: true
        default: "false"

permissions:
  id-token: write
  contents: read

env:
  # RG da infra separado de secrets externos (ex.: SendGrid, configurado manualmente na Function App).
  RG_NAME: rg-${{ inputs.prefix }}-${{ inputs.environment }}-infra

jobs:
  deploy:
    environment: Actions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Criar Resource Group (idempotente)
        uses: Azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -e
            az group create --name "${{ env.RG_NAME }}" --location "${{ inputs.location }}"

      - name: Registar resource providers (primeira subscrição pode demorar)
        uses: Azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -e
            for ns in Microsoft.OperationalInsights Microsoft.Insights Microsoft.Storage; do
              reg=$(az provider show -n "$ns" --query registrationState -o tsv 2>/dev/null || true)
              if [ "$reg" != "Registered" ]; then
                echo "A registar $ns ..."
                az provider register -n "$ns" --wait || true
              fi
            done

      - name: Gerar ficheiro de parâmetros
        env:
          P_PREFIX: ${{ inputs.prefix }}
          P_ENV: ${{ inputs.environment }}
          P_LOCATION: ${{ inputs.location }}
          P_TABLE: ${{ inputs.feedback_table_name }}
          P_TIMEOUT: ${{ inputs.azure_http_timeout_seconds }}
          P_FUNC_BASE: ${{ inputs.function_app_base_name }}
          P_FUNC_UNIQ: ${{ inputs.function_app_use_unique_suffix }}
        run: |
          set -e
          python3 << 'PY'
          import json, os
          params = {
            "prefix": {"value": os.environ["P_PREFIX"]},
            "envName": {"value": os.environ["P_ENV"]},
            "location": {"value": os.environ["P_LOCATION"]},
            "feedbackTableName": {"value": os.environ["P_TABLE"]},
            "azureHttpTimeoutSeconds": {"value": int(os.environ.get("P_TIMEOUT", "10"))},
            "functionAppBaseName": {"value": os.environ.get("P_FUNC_BASE", "")},
            "functionAppUseUniqueSuffix": {"value": str(os.environ.get("P_FUNC_UNIQ", "false")).lower() == "true"},
          }
          with open("deploy-params.json", "w", encoding="utf-8") as f:
            json.dump(
              {
                "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentParameters.json#",
                "contentVersion": "1.0.0.0",
                "parameters": params,
              },
              f,
              indent=2,
            )
          PY

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RG_NAME }}
          template: ./infra/main.bicep
          parameters: ./deploy-params.json
          deploymentName: deploy-${{ inputs.prefix }}-${{ inputs.environment }}
          failOnStdErr: false

      - name: Mostrar outputs
        uses: Azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -e
            az deployment group show \
              --resource-group "${{ env.RG_NAME }}" \
              --name "deploy-${{ inputs.prefix }}-${{ inputs.environment }}" \
              --query properties.outputs \
              -o json
