name: Deploy Java project to Azure Function App

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [ main ]

env:
  AZURE_FUNCTIONAPP_NAME: tc4fb-func-u6sgesvkkh2ie
  DISTRIBUTION: zulu
  JAVA_VERSION: "21"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4

      - name: Setup Java Sdk ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Deploy (Publish Profile)
        uses: Azure/functions-action@v1
        if: ${{ env.PUBLISH_PROFILE != '' }}
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: build/azure-functions/${{ env.AZURE_FUNCTIONAPP_NAME }}
          publish-profile: ${{ env.PUBLISH_PROFILE }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        if: ${{ env.PUBLISH_PROFILE == '' }}
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy (RBAC)
        uses: Azure/functions-action@v1
        if: ${{ env.PUBLISH_PROFILE == '' }}
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: build/azure-functions/${{ env.AZURE_FUNCTIONAPP_NAME }}

