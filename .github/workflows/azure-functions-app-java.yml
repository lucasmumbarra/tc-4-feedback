name: Deploy Java project to Azure Function App

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      function_app_name:
        description: Nome exato da Function App no Azure (tem de bater com o pacote target/azure-functions/<nome>)
        required: true
        default: tc4fb-func
      resource_group:
        description: Resource group onde está a Function App
        required: true
        default: rg-tc4fb-demo-infra

env:
  DISTRIBUTION: zulu
  JAVA_VERSION: "21"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Actions
    env:
      AZURE_FUNCTIONAPP_NAME: ${{ inputs.function_app_name }}
    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4

      - name: Setup Java Sdk ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build with Maven
        run: mvn -B package -Dquarkus.azure-functions.app-name=${{ env.AZURE_FUNCTIONAPP_NAME }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions (RBAC)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: target/azure-functions/${{ env.AZURE_FUNCTIONAPP_NAME }}

      - name: Configure SendGrid SMTP app settings
        run: |
          az functionapp config appsettings set \
            --name "$AZURE_FUNCTIONAPP_NAME" \
            --resource-group "${{ inputs.resource_group }}" \
            --settings \
              "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}" \
              "NOTIFY_FROM_EMAIL=${{ secrets.NOTIFY_FROM_EMAIL }}" \
              "ADMIN_NOTIFY_EMAIL=${{ secrets.ADMIN_NOTIFY_EMAIL }}" \
              "SMTP_HOST=smtp.sendgrid.net" \
              "SMTP_PORT=587" \
              "SMTP_USERNAME=apikey" \
              "SEND_CRITICAL_EMAIL_FUNCTION_KEY=${{ secrets.SEND_CRITICAL_EMAIL_FUNCTION_KEY }}" \
            --output none
          echo "App settings de e-mail atualizadas na Function App."
