services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: feedback-azurite
    restart: unless-stopped
    ports:
      - "10000:10000" # blob
      - "10001:10001" # queue
      - "10002:10002" # table
    volumes:
      - azurite_data:/data
    command: >
      azurite
      --blobHost 0.0.0.0 --blobPort 10000
      --queueHost 0.0.0.0 --queuePort 10001
      --tableHost 0.0.0.0 --tablePort 10002
      --location /data
      --debug /data/azurite-debug.log

volumes:
  azurite_data:

